### THIS IS THE TEMPLATE YAML FILE FOR RNA-SCOPE DATA PREPROCESSING ###
### COPY AND RENAME THE FILE USING THE EXPERIMENT NAME AND MODIFY THE PARAMETERS AS NEEDED ###

# IMPORTANT NOTE: All I/O paths are absolute paths. On Windows, all paths and files must be on the same drive.

# ----- RNA-Scope Data I/O ----- #

# -- Define the Data Tables for the RNA-Scope Pipeline -- #

data_inputs:
  # Name this experiment
  experiment_name: RNAScope_ACxDev1_CBA-CAJ_P18

  # Metadata for the experiment
  metadata:
    age: P18
    sex: male
    treatment: control # or Tone Reared, etc.
    strain: CBA-CAJ
    species: mouse
    tissue: brain
    slice_orientation: horizontal

  # Absolute path to the `cell_metadata.csv` file
  cell_metadata_csv: E:/RNAScope/RNAScope_Data/ACxDev1_CBA-CAJ_P18/data/cellpose/cell_metadata.csv
  # Absolute path to the `cell_by_gene.csv` file
  cell_by_gene_csv: E:/RNAScope/RNAScope_Data/ACxDev1_CBA-CAJ_P18/data/cellpose/cell_by_gene.csv

  # If specified and file exist, use this hdf5 file instead of loading from CSV
  prioritized_hdf5: #E:/RNAScope/RNAScope_Data/ACxDev1_CBA-CAJ_P18/analysis/ACxDev1_CBA-CAJ_P18_celltyped_filtered.hdf5

  # Rotation angle for the spatial plot
  spatial_rotation_degrees: -30
  spatial_flip_x: true

  # Data tables for the detected spots
  detected_transcripts:
    # List of detected transcripts tables to analyze. Note that a summary json will be generated for all tables here, but only the last 2 tables will be used for QC comparisons.
    # Finally, only a single table from this list can be chosen for downstream analysis.
    detected_transcripts_csv:
      # Absolute path to the `detected_transcripts.csv` files (default, and/or after VPT resegmentation)
      - csv: E:/RNAScope/RNAScope_Data/ACxDev1_CBA-CAJ_P18/data/detected_transcripts.csv
        # Absolute path to the `detected_transcripts_metadata.json` file generated by `./detected_transcripts_metadata` binary
        json: E:/RNAScope/RNAScope_Data/ACxDev1_CBA-CAJ_P18/data/detected_transcripts_metadata.json
        # Name of this detected_transcripts table
        name: watershed
        # Whether to use the JSON data file by default, instead of re-processing the CSV
        prioritize_json: true

      - csv: E:/RNAScope/RNAScope_Data/ACxDev1_CBA-CAJ_P18/data/cellpose/detected_transcripts.csv
        json: E:/RNAScope/RNAScope_Data/ACxDev1_CBA-CAJ_P18/data/cellpose/detected_transcripts_metadata.json
        name: cellpose
        prioritize_json: true

    # Choose one of the tables in detected_transcripts_csv to be used for the final analysis. Default to the last table listed above.
    use_for_analysis: cellpose

  # Regions of interest (ROIs) for differential expression analysis
  roi:
    - roi_set_name: Left ACx
      roi_set_values:
        - Left Primary auditory area, layer 2/3
        - Left Primary auditory area, layer 4
        - Left Primary auditory area, layer 5
        - Left Primary auditory area, layer 6a
        - Left Primary auditory area, layer 6b

    - roi_set_name: Right ACx
      roi_set_values:
        - Right Primary auditory area, layer 2/3
        - Right Primary auditory area, layer 4
        - Right Primary auditory area, layer 5
        - Right Primary auditory area, layer 6a
        - Right Primary auditory area, layer 6b

    - roi_set_name: Left ACx Layer 2/3
      roi_set_values:
        - Left Primary auditory area, layer 2/3
    - roi_set_name: Left ACx Layer 4
      roi_set_values:
        - Left Primary auditory area, layer 4
    - roi_set_name: Left ACx Layer 5
      roi_set_values:
        - Left Primary auditory area, layer 5
    - roi_set_name: Left ACx Layer 6
      roi_set_values:
        - Left Primary auditory area, layer 6a
        - Left Primary auditory area, layer 6b

    - roi_set_name: Right ACx Layer 2/3
      roi_set_values:
        - Right Primary auditory area, layer 2/3
    - roi_set_name: Right ACx Layer 4
      roi_set_values:
        - Right Primary auditory area, layer 4
    - roi_set_name: Right ACx Layer 5
      roi_set_values:
        - Right Primary auditory area, layer 5
    - roi_set_name: Right ACx Layer 6
      roi_set_values:
        - Right Primary auditory area, layer 6a
        - Right Primary auditory area, layer 6b


# -- Define the Output Options for this RNAScope Analysis Pipeline -- #

data_outputs:
  # Absolute path to the output directory for the analysis
  output_dir: E:/RNAScope/RNAScope_Data/ACxDev1_CBA-CAJ_P18/analysis

  # Whether to normalize the mean transcript count per cell to a set value (useful for comparing across datasets)
  normalize_mean_transcript_per_cell:
    enable: true
    target_value: 750

# ----- RNAScope Processing ----- #

# -- Parameters for Data Filtering -- #

data_filters:
  # Define the filtering order of operations and thresholds. The steps can be repeated, and the order is significant.
  # The available steps are: cell_volume, normalize_transcript_by_volume, transcript_count, gene_per_cell

  filtering_procedure:
    - cell_volume:
        format: percentile
        min: 3
        max: 97

    # Using the blanks for filtering the genes in cells
    - blank_thresholding:
        set_threshold: blank_max # options: [blank_max, blank_min, blank_mean, blank_median]
        filter_action: remove # options: [remove, subtract]
        # Example: if set_threshold is blank_max and filter_action is remove, then all genes with transcripts count < blank_max will be removed (transcripts set to 0), on the cell level. If the transcripts count is >= blank_max, the genes' transcript count is kept as is.

    # Set to whether the transcript count should be normalized by the cell volume
    - normalize_transcript_by_volume: true

    - transcript_count:
        format: percentile
        min: 1
        max: 99

    - gene_per_cell: # Number of unique genes detected within each cell, ignoring Blanks if exist
        format: literal
        min: 0
        max: 1000 # a big number exceeding the maximum number of genes in the gene panel

  # Whether to keep a copy of un-normalized transcript counts in anndata.raw
  retain_raw_transcript_count: true